services:
  - type: web
    name: mi-ecommerce
    runtime: docker
    plan: free
    autoDeploy: true
    rootDir: .
    healthCheckPath: /login
    envVars:
      - key: APP_NAME
        value: Mi Ecommerce
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: FORCE_HTTPS
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: RUN_AUTH_SEED
        value: "true"
      - key: APP_KEY
        sync: false
      - key: VIEW_COMPILED_PATH
        value: /var/www/html/storage/framework/views

      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt

      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

      - key: FILESYSTEM_DISK
        value: public

      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: no-reply@example.com
      - key: MAIL_FROM_NAME
        value: Mi Ecommerce

      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: usd
      - key: STRIPE_WEBHOOK_TOLERANCE
        value: "300"

      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: PAYPAL_CURRENCY
        value: USD
      - key: PAYPAL_WEBHOOK_ID
        sync: false
